name: Docker Workflow
on:
  push:
    branches-ignore:
      - none
    tags:
      - "*"
    paths:
      - "**"
  workflow_dispatch:
jobs:
  build:
    name: Build
    timeout-minutes: 30
    runs-on: self-hosted
    steps:
      - name: Checkout code from repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tag name based on branch
        id: set_tag
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            GITHUB_REFNAME=${{ github.ref_name }}
            BRANCH_NAME=${GITHUB_REFNAME//\//_}
            echo "tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: hivesolutions/mailog:${{ steps.set_tag.outputs.tag }}
          provenance: true
          sbom: true

      - name: Trigger mailog deployment
        if: github.event_name == 'push' && github.ref_name == 'master'
        run: |
          curl -s --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_DEPLOY_PAT }}" \
            https://api.github.com/repos/hivesolutions/infra-bemisc/dispatches \
            -d '{"event_type":"deploy-mailog-latest"}'

      - name: Trigger mailog stable deployment
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          curl -s --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_DEPLOY_PAT }}" \
            https://api.github.com/repos/hivesolutions/infra-bemisc/dispatches \
            -d '{"event_type":"deploy-mailog","client_payload":{"tag":${{ toJSON(github.ref_name) }}}}'
